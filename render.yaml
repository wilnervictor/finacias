databases:
  - name: finacias-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: finacias-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finacias-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
